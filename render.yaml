services:
  # Backend Web Service
  - type: web
    name: nesco-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # Frontend Static Site
  - type: static
    name: nesco-frontend
    env: static
    buildCommand: npm run build
    publishDir: dist
    root: nesco-frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: nesco-backend
          property: url
